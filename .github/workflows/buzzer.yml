name: LE BUZZER — épisode quotidien

on:
  schedule:
    - cron: '0 11 * * *'   # 7h00 EDT (UTC-4) — sortie matinale pour le commute
  workflow_dispatch:        # bouton Run manuel dans GitHub

permissions:
  contents: write

jobs:
  buzzer:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Installer ffmpeg (binaire statique)
        run: |
          wget -q https://github.com/BtbN/ffmpeg-builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/ffmpeg
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/ffprobe
          ffmpeg -version | head -1

      - name: Générer LE BUZZER du jour
        run: |
          # Date à l'heure du Québec (Est), pas UTC — sinon édition "du lendemain" le soir
          DATE=$(TZ="America/Toronto" date +%Y-%m-%d)
          export AUDIO_BASE_URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$DATE"
          echo "DATE=$DATE" >> $GITHUB_ENV
          python run.py --date "$DATE"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PODCAST_TITLE: LE BUZZER
          PODCAST_DESCRIPTION: "Le podcast sport quotidien francophone québécois. Résultats, histoires et potins de la LNH, NBA, foot, F1 et MMA en 5 minutes. Les épisodes restent disponibles 7 jours."
          PODCAST_BASE_URL: https://www.lebuzzer.com
          PODCAST_ARTWORK_URL: https://www.lebuzzer.com/artwork.png
          PODCAST_AUTHOR: LE BUZZER
          PODCAST_OWNER_EMAIL: lebuzzerpod@gmail.com
          EPISODE_TITLE_PREFIX: "LE BUZZER — édition du"
          SYSTEM_PROMPT_FILE: prompts/system_buzzer_v1.md
          SOURCES_FILE: config/sources_buzzer.yaml
          CLAUDE_MODEL: claude-sonnet-4-6
          # Voix québécoise authentique (edge-tts, gratuit). Antoine = accent fr-CA.
          TTS_PROVIDER: edge
          TTS_VOICE: fr-CA-AntoineNeural
          BRIEFING_DUREE_CIBLE: "5"
          BRIEFING_FENETRE_HEURES: "24"
          FEED_KEEP_DAYS: "7"

      - name: Publier le MP3
        run: |
          if gh release view "$DATE" > /dev/null 2>&1; then
            gh release upload "$DATE" "output/audio/$DATE.mp3" --clobber
          else
            gh release create "$DATE" \
              --title "LE BUZZER — édition du $DATE" \
              --notes "Épisode automatisé LE BUZZER" \
              "output/audio/$DATE.mp3"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sauvegarder feed.xml, contexte et script
        run: |
          git config user.name "Buzzer Bot"
          git config user.email "buzzer-bot@noreply"
          git add feed.xml data/context.json "output/scripts/$DATE.xml"
          git diff --cached --quiet || git commit -m "buzzer: $DATE [skip ci]"
          git pull --rebase origin main
          git push

      - name: Alerte si échec
        if: failure()
        run: |
          gh issue create \
            --title "⚠️ Épisode LE BUZZER échoué — $DATE" \
            --body "Le workflow buzzer a échoué. Voir le run : $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --label "incident" 2>/dev/null || echo "::error::Buzzer échoué pour $DATE (création d'issue impossible)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
